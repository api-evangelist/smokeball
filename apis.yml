aid: smokeball
name: Smokeball
description: Legal practice management software with a REST API for managing matters,
  contacts, documents, time entries, billing, trust accounting, and law firm workflows.
  The API follows REST principles, accepts JSON, returns JSON, and supports OAuth
  2.0 authentication. Available in US, AU, and UK regions.
